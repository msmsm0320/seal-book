services:
  - type: web
    name: seal-book
    runtime: static
    buildCommand: mkdir -p public && cp index.html styles.css app.js public/ && cp -r assets public/assets
    staticPublishPath: ./public
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
